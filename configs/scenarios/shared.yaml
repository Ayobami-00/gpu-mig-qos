api_key_env: VLLM_API_KEY
system_prompt_path: ../../prompts/system.txt
timeout_s: 300

tenants:
  tenant_a:
    endpoint: http://127.0.0.1:8000/v1
    model: ${MODEL_ID}
    prompt_path: ../../prompts/tenant_a.txt
    concurrency: 8
    phases:
      - name: warmup
        duration_s: 20
        rps: 1.0
        max_tokens: 64
        temperature: 0.0
      - name: quiet
        duration_s: 60
        rps: 3.0
        max_tokens: 64
        temperature: 0.0
      - name: burst
        duration_s: 60
        rps: 3.0
        max_tokens: 64
        temperature: 0.0
      - name: burst_2
        duration_s: 60
        rps: 3.0
        max_tokens: 64
        temperature: 0.0

